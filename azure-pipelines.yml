trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Common'

variables:
  buildConfiguration: 'Release'
  projectPath: 'RICADO.MettlerToledo/RICADO.MettlerToledo.csproj'
  testProjectPath: 'RICADO.MettlerToledo.Tests/RICADO.MettlerToledo.Tests.csproj'
  nugetOutputDir: '$(Build.ArtifactStagingDirectory)/nupkg'

steps:
  - script: dotnet restore
    displayName: 'Restore NuGet packages'

  - script: dotnet build --configuration $(buildConfiguration) --no-restore
    displayName: 'Build solution'

  - script: >
      dotnet test $(testProjectPath)
      --configuration $(buildConfiguration)
      --no-build
      --logger "trx;LogFileName=test-results.trx"
      --results-directory $(Build.ArtifactStagingDirectory)/TestResults
    displayName: 'Run unit tests'

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '$(Build.ArtifactStagingDirectory)/TestResults/**/*.trx'
      mergeTestResults: true
      testRunTitle: 'Unit Tests'

  - script: >
      dotnet pack $(projectPath)
      --configuration $(buildConfiguration)
      --no-build
      --output $(nugetOutputDir)
    displayName: 'Pack NuGet package'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish NuGet artifacts'
    inputs:
      PathtoPublish: '$(nugetOutputDir)'
      ArtifactName: 'nupkg'
      publishLocation: 'Container'

  - script: >
      dotnet nuget push "$(nugetOutputDir)/*.nupkg"
      --source "https://nexus.omda.com/repository/CSAM-nuGet/"
      --api-key $(NexusApiKey)
      --skip-duplicate
    displayName: 'Push to Nexus Artifactory'
    condition: and(succeeded(), eq(variables['PushToNexus'], 'true'))
