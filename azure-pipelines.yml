trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Common'

variables:
  group: NexusCredentials
  buildConfiguration: 'Release'
  projectPath: 'Omda.MettlerToledo/Omda.MettlerToledo.csproj'
  testProjectPath: 'Omda.MettlerToledo.Tests/Omda.MettlerToledo.Tests.csproj'
  nugetOutputDir: '$(Build.ArtifactStagingDirectory)/nupkg'

stages:
  # ─────────────────────────────────────────────────────────
  # Stage 1: Build and Test
  # ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Restore, Build, Test, Pack'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK 9.x'
            inputs:
              packageType: 'sdk'
              version: '9.x'

          - script: dotnet restore
            displayName: 'Restore NuGet packages'

          - script: dotnet build --configuration $(buildConfiguration) --no-restore
            displayName: 'Build solution'

          - script: >
              dotnet test $(testProjectPath)
              --configuration $(buildConfiguration)
              --no-build
              --logger "trx;LogFileName=test-results.trx"
              --collect:"XPlat Code Coverage"
              --results-directory $(Agent.TempDirectory)/TestResults
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
              mergeTestResults: true
              testRunTitle: 'Unit Tests'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

          - script: >
              dotnet pack $(projectPath)
              --configuration $(buildConfiguration)
              --no-build
              --output $(nugetOutputDir)
            displayName: 'Pack NuGet package'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish NuGet artifacts'
            inputs:
              PathtoPublish: '$(nugetOutputDir)'
              ArtifactName: 'nupkg'
              publishLocation: 'Container'

  # ─────────────────────────────────────────────────────────
  # Stage 2: Deploy to Nexus (manual approval required)
  # ─────────────────────────────────────────────────────────
  - stage: DeployToNexus
    displayName: 'Publish to Nexus'
    dependsOn: Build
    condition: succeeded()
    variables:
      - group: NexusCredentials
    jobs:
      - deployment: PublishNuGet
        displayName: 'Push NuGet to Nexus'
        environment: 'NexusProduction'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UseDotNet@2
                  displayName: 'Install .NET SDK 9.x'
                  inputs:
                    packageType: 'sdk'
                    version: '9.x'

                - script: dotnet nuget push "$(Pipeline.Workspace)\nupkg\*.nupkg" --source "https://nexus.myomda.com/repository/CSAM-nuGet/" --api-key "$(NexusApiKey)" --skip-duplicate
                  displayName: 'Push to Nexus Artifactory'
